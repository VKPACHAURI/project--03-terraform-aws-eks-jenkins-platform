apiVersion: apps/v1
kind: Deployment
metadata:
  name: project03-flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project03-flask-app
  template:
    metadata:
      labels:
        app: project03-flask-app
    spec:
      containers:
      - name: project03-flask-app
        image: visheshachauri/project03-flask-app:v1
        ports:
        - containerPort: 5000